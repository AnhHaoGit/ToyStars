<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo tài khoản</title>
    <link rel="stylesheet" href="../CSS/Signup.css">
    <link rel="icon" href="websitelogo2.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/b25957ae4f.js" crossorigin="anonymous"></script>

<body>
<!-- HEADER -->
    <div class="container1">
        <div class="item">
            <a href="Login.html" class="title1-1"><i class="fa-solid fa-right-to-bracket"></i>ĐĂNG NHẬP</a>
            <a href="index.html" class="title1-2"><i class="fa-solid fa-house"></i>TRANG CHỦ</a>
        </div>
    </div>
<!-- FORM ĐĂNG KÝ -->
    <div class="container2">
        <div class="box3">
            <div class="user"><i class="fa-solid fa-user"></i></div>
            <form>
                TÊN ĐĂNG NHẬP<br><br>
                <input type="text" class="input"><br><br>
                MẬT KHẨU<br><br>
                <input type="password" class="input"><br>
            </form>
            <input class="checkbox" type="checkbox"><span>Hiện mật khẩu</span>
            <button class="button1" type="submit">Tạo tài khoản</button>
            <button class="button2">
                <span class="span1">Tạo tài khoản với Google</span>
                <i class="fa-brands fa-google"></i>
            </button>
            <button class="button3">
                <span>Tạo tài khoản với Facebook</span>
                <i class="fa-brands fa-facebook-f"></i>
            </button>
        </div>
    </div>
