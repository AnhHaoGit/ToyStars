<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="2Login.css">
    <link rel="icon" href="websitelogo2.png">
    <script src="https://kit.fontawesome.com/b25957ae4f.js" crossorigin="anonymous"></script>
</head>

<body>
<!-- HEADER -->
    <div class="container1">
        <div class="item">
            <a href="1Signup.html" class="title1-1"><i class="fa-solid fa-user"></i>TẠO TÀI KHOẢN</a>
            <a href="1Home.html" class="title1-2"><i class="fa-solid fa-house"></i>TRANG CHỦ</a>
        </div>
        <div class="bar"><i class="fa-solid fa-bars"></i></div>
        <div class="list">
            <a href="1Signup.html" class="title2 title2-1">TẠO TÀI KHOẢN</a>
            <a href="1Home.html" class="title2 title2-2">TRANG CHỦ</a>
        </div>
    </div>
<!-- TIN NHẮN -->
    <div class="message">
		<div class="messagebox1"><i class="fa-solid fa-message"></i></div>
		<div class="messagebox2">
            <img src="websitelogo2.png" alt="" class="messageimg">
            <div class="messagetext1">Trò chuyện cùng ToyStars</div>
            <form action="" class="messageform">
                <input type="text" class="messageinput">
                <button class="sendmessage1"><i class="fa-solid fa-envelope sendmessage2"></i></button>
            </form>
        </div>
	</div>
<!-- FORM ĐĂNG NHẬP -->
    <div class="container2">
        <div class="box3">
            <div class="user"><i class="fa-solid fa-right-to-bracket"></i></div>
            <form>
                TÊN ĐĂNG NHẬP<br><br>
                <input type="text" class="input"><br><br>
                MẬT KHẨU<br><br>
                <input type="password" class="input"><br>
            </form>
            <input class="checkbox" type="checkbox"><span>Hiện mật khẩu</span>
            <button class="button1" type="submit">Đăng nhập</button>
            <a href="1Signup.html" class='text'>Bạn quên mật khẩu?</a>
            <a href="1Signup.html" class='text'>Bạn chưa có tài khoản?</a>
            <button class="button2">
                <span>Đăng nhập với Google</span>
                <i class="fa-brands fa-google"></i>
            </button>
            <button class="button3">
                <span>Đăng nhập với Facebook</span>
                <i class="fa-brands fa-facebook-f"></i>
            </button>
        </div>
    </div>
</body>

</html>
